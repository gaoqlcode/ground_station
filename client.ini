# Ground Station Client Configuration File
# Default configuration for ground station client

[Server]
# Server IP address
Address=192.168.218.145

# Command port (TCP) - must match server config
CommandPort=8888

# Data port (UDP)
DataPort=8889

# Connection timeout in milliseconds
ConnectionTimeout=5000

# Reconnect interval in milliseconds
ReconnectInterval=3000

# Maximum reconnect attempts
MaxReconnectAttempts=5

[Buffer]
# Receive buffer size in bytes (1MB)
ReceiveBufferSize=1048576

# Send buffer size in bytes (512KB)
SendBufferSize=524288

# Frame buffer size (number of frames)
FrameBufferSize=30

# Maximum queue size
MaxQueueSize=100

[Stream]
# Maximum stream count (supports up to 2 streams)
MaxStreamCount=2

# Stream timeout in milliseconds
StreamTimeout=10000

# Heartbeat interval in milliseconds
HeartbeatInterval=5000

# Registration timeout in milliseconds
RegistrationTimeout=5000

[Log]
# Log file path
FilePath=logs/ground_station.log

# Log level (0=Debug, 1=Info, 2=Warning, 3=Error)
Level=1

# Enable console output
EnableConsole=true

# Maximum log file size in bytes (10MB)
MaxFileSize=10485760

# Maximum number of log files
MaxLogFiles=5